spring:
  application:
    name: order-processing-system
  threads:
    virtual:
      enabled: true
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000

logging:
  file:
    name: logs/ops-logs.log
